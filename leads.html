<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shareek Leads</title><style>body{margin:0;background:#e8e6dd;color:#0d1b2a;font:15px Arial}.login{width:330px;max-width:85%;margin:15vh auto;background:white;padding:28px;border-radius:16px;text-align:center}.logo{font-size:26px;font-weight:bold}.logo i{color:#2fa36b;font-style:normal}input,button,select{box-sizing:border-box;width:100%;padding:11px;margin-top:10px;border:1px solid #ccc;border-radius:8px}button{background:#2fa36b;color:white;border:0;font-weight:bold}header{background:#0d1b2a;color:white;padding:16px}.wrap{max-width:1100px;margin:auto;padding:16px}table{width:100%;min-width:760px;border-collapse:collapse;background:#fff}th{background:#0d1b2a;color:#fff}td,th{padding:10px;text-align:right;border-bottom:1px solid #ddd;vertical-align:top}.scroll{overflow:auto;margin-top:12px}.muted{font-size:11px;color:#667}</style><main id="app"></main><script>const SB='https://pxeiozmsfvmypcsqbcqv.supabase.co',API=SB+'/functions/v1/leads',ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4ZWlvem1zZnZteXBjc3FiY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDI1MTcsImV4cCI6MjA5NzYxODUxN30.s23PCgc_HuGRUSdN3hMNXBsdsavofLBIZj3Ppq5lP94';let s,m;const a=document.querySelector('#app'),e=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function login(x=''){a.innerHTML=`<section class=login><div class=logo>Shareek <i>Leads</i></div><p>سجل العملاء المحتملين</p><input id=em type=email placeholder="البريد الإلكتروني"><input id=pw type=password placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')go()"><button onclick=go()>تسجيل الدخول</button><p>${e(x)}</p></section>`}async function go(){let r=await fetch(SB+'/auth/v1/token?grant_type=password',{method:'POST',headers:{apikey:ANON,'content-type':'application/json'},body:JSON.stringify({email:em.value,password:pw.value})});if(!r.ok)return login('البريد أو كلمة المرور غير صحيحة');s=await r.json();load()}async function load(){let r=await fetch(API,{method:'POST',headers:{apikey:ANON,authorization:'Bearer '+s.access_token,'content-type':'application/json'},body:JSON.stringify({action:'list',call_center_code:m?.call_center_code,status:'all'})}),j=await r.json();if(!r.ok)return login(j.error||'حدث خطأ');m=j;let rows=j.leads.map(l=>`<tr><td><b>${e(l.customer_name||'غير معروف')}</b><br>${e(l.phone_number||'—')}</td><td>${e(l.product_interest||'—')}<br><span class=muted>${e(l.summary||'')}</span></td><td>${e(l.temperature||'—')}</td><td>${e(l.next_action||'—')}</td><td>${e(l.status||'—')}</td></tr>`).join('');a.innerHTML=`<header>Shareek Leads</header><div class=wrap><button onclick=load()>تحديث</button><div class=scroll><table><tr><th>العميل</th><th>الطلب</th><th>الأولوية</th><th>الخطوة التالية</th><th>الحالة</th></tr>${rows}</table></div></div>`}login()</script></html>
