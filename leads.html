<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Shareek — Leads</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { --navy:#0D1B2A; --cream:#E8E6DD; --cream2:#D3D1C7; --green:#4CAF7D; --gGreen:#2FA36B; --gAmber:#E0A100; --gRed:#D64545; --blue:#274B7A; --ink-muted:#66717D; }
* { box-sizing:border-box; }
body { margin:0; min-height:100vh; background:var(--cream); color:var(--navy); font-family:Poppins,Cairo,sans-serif; }
[dir=rtl] body { font-family:Cairo,Poppins,sans-serif; }
button,input,select { font:inherit; }
button { cursor:pointer; transition:transform .16s ease, background-color .16s ease, box-shadow .16s ease, border-color .16s ease, opacity .16s ease; }
button:hover { transform:translateY(-1px); } button:active { transform:translateY(0); } button:focus-visible,input:focus-visible,select:focus-visible { outline:3px solid rgba(76,175,125,.35); outline-offset:2px; }
.wrap { max-width:1100px; margin:0 auto; padding:22px 16px 34px; }
header.top { min-height:64px; background:var(--navy); color:var(--cream); padding:12px 20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; box-shadow:0 2px 10px rgba(13,27,42,.16); }
.brand { display:inline-flex; align-items:center; gap:9px; font-size:22px; font-weight:700; white-space:nowrap; }
.brand-logo { width:25px; height:32px; flex:0 0 auto; }.brand em { color:#8bd4aa; font-style:normal; font-size:15px; font-weight:600; }
.sub { opacity:.72; font-size:12px; flex:1; }.top-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.top button,.langtoggle button { border:0; border-radius:8px; padding:8px 13px; color:#fff; font-weight:600; font-size:13px; }
.top .primary { background:var(--green); }.top .ghost { background:transparent; border:1px solid rgba(255,255,255,.35); }.langtoggle { display:inline-flex; overflow:hidden; border:1px solid rgba(255,255,255,.35); border-radius:8px; }.langtoggle button { border-radius:0; background:transparent; }.langtoggle button.active { background:var(--green); }
.login { width:360px; max-width:calc(100% - 28px); margin:12vh auto; padding:28px 26px; text-align:center; background:#fff; border-radius:16px; box-shadow:0 4px 20px rgba(13,27,42,.15); animation:appear .25s ease both; }.brand-box { display:inline-flex; align-items:center; gap:10px; padding:11px 20px; border-radius:14px; background:var(--navy); color:var(--cream); font-size:24px; font-weight:700; margin-bottom:14px; }.brand-box .brand-logo { width:26px; height:34px; }.login p { margin:0 0 18px; color:var(--ink-muted); font-size:13px; }.login input { width:100%; padding:12px 14px; border:1px solid var(--cream2); border-radius:10px; margin-top:10px; color:var(--navy); text-align:center; }.login .primary { width:100%; padding:12px; margin-top:12px; border:0; border-radius:10px; background:var(--green); color:#fff; font-weight:700; box-shadow:0 2px 5px rgba(47,163,107,.25); }.login .primary:hover { background:#3f9f70; box-shadow:0 5px 12px rgba(47,163,107,.3); }.login .primary:disabled { cursor:wait; opacity:.82; transform:none; }.error { min-height:19px; margin-top:10px; color:var(--gRed); font-size:12px; font-weight:600; }
.page-head { display:flex; justify-content:space-between; align-items:end; gap:16px; margin-bottom:16px; }.page-head h1 { margin:0; font-size:24px; }.page-head p { margin:4px 0 0; color:var(--ink-muted); font-size:12px; }
.filters { display:flex; gap:9px; flex-wrap:wrap; align-items:end; padding:13px; margin-bottom:16px; background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(13,27,42,.12); animation:appear .25s ease both; }.filter { display:flex; flex-direction:column; gap:4px; min-width:190px; flex:1; }.filter label { font-size:11px; color:var(--ink-muted); font-weight:600; }.filter select { width:100%; padding:9px 32px 9px 10px; border:1px solid var(--cream2); border-radius:8px; color:var(--navy); background:#fff; }.filter-status { flex:0 1 175px; }.refresh { padding:9px 14px; border:0; border-radius:8px; background:var(--green); color:#fff; font-weight:700; white-space:nowrap; }
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(175px,1fr)); gap:12px; margin:0 0 20px; }.kpi { padding:14px 16px; background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(13,27,42,.12); border-inline-start:4px solid var(--green); animation:appear .3s ease both; }.kpi:nth-child(2) { border-color:#e06f50; animation-delay:.03s; }.kpi:nth-child(3) { border-color:var(--gAmber); animation-delay:.06s; }.kpi:nth-child(4) { border-color:var(--blue); animation-delay:.09s; }.k-label { color:var(--ink-muted); font-size:12px; }.k-val { margin-top:3px; font-size:27px; line-height:1.1; font-weight:700; }.k-sub { margin-top:4px; color:var(--ink-muted); font-size:11px; }
.table-card { overflow:hidden; background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(13,27,42,.12); animation:appear .32s ease both; }.scroll { overflow-x:auto; }.leads { width:100%; min-width:1040px; border-collapse:collapse; font-size:13px; }.leads th { padding:10px 12px; color:var(--cream); background:var(--navy); text-align:start; font-weight:600; white-space:nowrap; }.leads td { padding:12px; vertical-align:top; border-top:1px solid var(--cream2); }.leads tbody tr { transition:background-color .16s ease; }.leads tbody tr:hover { background:#f6f5f0; }.customer { font-weight:700; }.muted { margin-top:2px; color:var(--ink-muted); font-size:11px; line-height:1.55; }.pill { display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; }.temp-hot { background:#fbe0dd; color:#b63e30; }.temp-warm { background:#fff1cd; color:#805d00; }.temp-cold { background:#e6ecf5; color:var(--blue); }.status-new { background:#e6ecf5; color:var(--blue); }.status-qualified,.status-won { background:#d9f2e4; color:#1d7a4d; }.status-contacted,.status-follow_up { background:#fff1cd; color:#805d00; }.status-lost { background:#f2eeee; color:#747474; }.overdue { color:var(--gRed); font-weight:700; }.edit { border:1px solid var(--cream2); background:#fff; color:var(--blue); border-radius:7px; padding:6px 9px; font-weight:700; font-size:11px; }.edit:hover { border-color:var(--green); color:#1d7a4d; }.editor td { padding:0; background:#f6f5f0; }.editor-box { display:grid; grid-template-columns:repeat(3,minmax(160px,1fr)); gap:10px; padding:14px; }.editor-box label { display:flex; flex-direction:column; gap:4px; font-size:11px; color:var(--ink-muted); font-weight:700; }.editor-box input,.editor-box select { padding:8px; color:var(--navy); border:1px solid var(--cream2); background:#fff; border-radius:7px; }.editor-actions { align-self:end; display:flex; gap:7px; }.save { background:var(--green); color:#fff; border:0; border-radius:7px; padding:8px 12px; font-weight:700; }.cancel { background:#fff; color:var(--navy); border:1px solid var(--cream2); border-radius:7px; padding:8px 12px; font-weight:700; }.empty { padding:40px 20px; text-align:center; color:var(--ink-muted); }.empty .empty-icon { display:block; margin-bottom:8px; font-size:28px; }.loading { padding:52px 20px; text-align:center; color:var(--ink-muted); }.spinner { display:inline-block; width:20px; height:20px; margin-inline-end:9px; vertical-align:-4px; border:3px solid var(--cream2); border-top-color:var(--green); border-radius:50%; animation:spin .75s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } } @keyframes appear { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
@media (max-width:650px) { header.top { padding:12px 14px; }.sub { order:3; flex-basis:100%; }.wrap { padding:18px 12px 28px; }.page-head { align-items:start; flex-direction:column; gap:5px; }.filters { align-items:stretch; }.filter,.filter-status { flex-basis:100%; }.refresh { width:100%; }.top-actions { gap:6px; }.top button,.langtoggle button { padding:7px 10px; }.editor-box { grid-template-columns:1fr; } }
</style>
</head>
<body><main id="app"></main>
<script>
const SB="https://pxeiozmsfvmypcsqbcqv.supabase.co", API=SB+"/functions/v1/leads", ALERT_API=SB+"/functions/v1/alerts";
const PUBLIC_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4ZWlvem1zZnZteXBjc3FiY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDI1MTcsImV4cCI6MjA5NzYxODUxN30.s23PCgc_HuGRUSdN3hMNXBsdsavofLBIZj3Ppq5lP94";
// Master-only page: every fresh visit starts in English. Arabic remains available
// for this visit through the language toggle, but is deliberately not persisted.
const app=document.getElementById("app"); let session=null, model=null, lang="en", selectedStatus="all", selectedQueue="all", editingLeadId=null, alerts=[], knownAlertIds=new Set();
const T={ ar:{ leads:"العملاء المحتملون", subtitle:"سجل العملاء المحتملين · توقيت بغداد · آخر تحديث", login:"تسجيل الدخول", email:"البريد الإلكتروني", password:"كلمة المرور", loginHint:"استخدم حساب لوحة Shareek الرئيسية", badLogin:"البريد أو كلمة المرور غير صحيحة", refresh:"تحديث", logout:"خروج", client:"العميل", status:"الحالة", queue:"قائمة العمل", all:"كل العملاء", allQueues:"كل العملاء", dueToday:"اليوم", overdue:"متأخر", unassigned:"بدون مسؤول", total:"إجمالي العملاء", hot:"أولوية عالية", follow:"تحتاج متابعة", won:"تمت", customer:"العميل", interest:"الطلب", priority:"الأولوية", owner:"المسؤول", action:"الخطوة التالية", updated:"آخر نشاط", edit:"تحديث", save:"حفظ", cancel:"إلغاء", lostReason:"سبب الإغلاق", followUp:"موعد المتابعة", noLeads:"لا توجد عملاء محتملون لهذا العميل بعد", noLeadsHint:"سيظهرون هنا تلقائياً عند التقاطهم من المكالمات والرسائل.", loading:"جاري تحميل العملاء…", error:"حدث خطأ", unknown:"غير معروف", none:"—", new:"جديد", qualified:"مؤهل", contacted:"تم التواصل", follow_up:"متابعة", wonStatus:"تمت", lost:"مغلق", hotTemp:"عالية", warm:"متوسطة", cold:"منخفضة", saved:"تم التحديث" }, en:{ leads:"Leads", subtitle:"Lead register · Baghdad time · updated", login:"Sign in", email:"Email", password:"Password", loginHint:"Use your Shareek dashboard account", badLogin:"Incorrect email or password", refresh:"Refresh", logout:"Sign out", client:"Client", status:"Status", queue:"Work queue", all:"All leads", allQueues:"All leads", dueToday:"Due today", overdue:"Overdue", unassigned:"No owner", total:"Total leads", hot:"High priority", follow:"Need follow-up", won:"Won", customer:"Customer", interest:"Interest", priority:"Priority", owner:"Owner", action:"Next action", updated:"Last activity", edit:"Update", save:"Save", cancel:"Cancel", lostReason:"Lost reason", followUp:"Follow-up time", noLeads:"No leads for this client yet", noLeadsHint:"New leads captured from calls and messages will appear here.", loading:"Loading leads…", error:"Something went wrong", unknown:"Unknown", none:"—", new:"New", qualified:"Qualified", contacted:"Contacted", follow_up:"Follow-up", wonStatus:"Won", lost:"Lost", hotTemp:"Hot", warm:"Warm", cold:"Cold", saved:"Saved" } };
const t=k=>T[lang][k]||k, esc=x=>String(x??"").replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const logo=`<svg class="brand-logo" viewBox="0 0 34 44" fill="none" aria-hidden="true"><path d="M11,34 C24,34 24,22 17,22 C10,22 10,10 23,10" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/><circle cx="23" cy="10" r="3.4" fill="currentColor"/><circle cx="11" cy="34" r="3.4" fill="currentColor"/></svg>`;
function setLang(next){lang=next;document.documentElement.lang=lang;document.documentElement.dir=lang==="ar"?"rtl":"ltr";session?render():login();}
function fmt(iso){if(!iso)return t("none");return new Intl.DateTimeFormat(lang==="ar"?"ar-u-nu-latn":"en-GB",{timeZone:"Asia/Baghdad",dateStyle:"medium",timeStyle:"short"}).format(new Date(iso));}
function baghdadDay(iso){const p=new Intl.DateTimeFormat("en-GB",{timeZone:"Asia/Baghdad",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date(iso));const v=Object.fromEntries(p.map(x=>[x.type,x.value]));return `${v.year}-${v.month}-${v.day}`;}
function localInput(iso){if(!iso)return "";const p=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Baghdad",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hourCycle:"h23"}).formatToParts(new Date(iso));const v=Object.fromEntries(p.map(x=>[x.type,x.value]));return `${v.year}-${v.month}-${v.day}T${v.hour}:${v.minute}`;}
function active(l){return l.status!=="won"&&l.status!=="lost";}
function inQueue(l){if(selectedQueue==="all")return true;if(selectedQueue==="unassigned")return active(l)&&!l.assigned_to;if(!l.follow_up_at)return false;const now=Date.now(), due=new Date(l.follow_up_at).getTime();if(selectedQueue==="overdue")return active(l)&&due<now;if(selectedQueue==="due_today")return active(l)&&baghdadDay(l.follow_up_at)===baghdadDay(new Date());return true;}
function login(msg=""){document.documentElement.lang=lang;document.documentElement.dir=lang==="ar"?"rtl":"ltr";app.innerHTML=`<section class="login"><div class="brand-box">${logo}<span>Shareek</span></div><p>${t("leads")} · ${t("loginHint")}</p><input id="email" type="email" autocomplete="username" placeholder="${t("email")}" onkeydown="if(event.key==='Enter')signIn()"><input id="password" type="password" autocomplete="current-password" placeholder="${t("password")}" onkeydown="if(event.key==='Enter')signIn()"><button id="loginButton" class="primary" onclick="signIn()">${t("login")}</button><div class="error">${esc(msg)}</div><p><button style="border:0;background:none;color:#274B7A" onclick="setLang('${lang==='ar'?'en':'ar'}')">${lang==='ar'?'English':'العربية'}</button></p></section>`;document.getElementById("email").focus();}
function loading(message){app.innerHTML=`<div class="loading"><span class="spinner"></span>${message}</div>`;}
async function signIn(){const email=document.getElementById("email").value,password=document.getElementById("password").value,button=document.getElementById("loginButton");button.disabled=true;button.innerHTML=`<span class="spinner" style="width:15px;height:15px;border-width:2px"></span>${lang==='ar'?'جاري تسجيل الدخول…':'Signing in…'}`;await new Promise(requestAnimationFrame);try{const r=await fetch(SB+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:PUBLIC_KEY,"content-type":"application/json"},body:JSON.stringify({email,password})});if(!r.ok)return login(t("badLogin"));session=await r.json();loading(lang==='ar'?'تم الدخول، جاري فتح لوحة العملاء…':'Signed in — opening Leads…');await load();}catch(_){login(t("error"));}}
async function api(payload){const r=await fetch(API,{method:"POST",headers:{apikey:PUBLIC_KEY,authorization:"Bearer "+session.access_token,"content-type":"application/json"},body:JSON.stringify(payload)});const j=await r.json();if(!r.ok)throw new Error(j.error||t("error"));return j;}
async function alertsApi(payload){const r=await fetch(ALERT_API,{method:"POST",headers:{apikey:PUBLIC_KEY,authorization:"Bearer "+session.access_token,"content-type":"application/json"},body:JSON.stringify(payload)});const j=await r.json();if(!r.ok)throw new Error(j.error||t("error"));return j;}
async function loadAlerts(){if(!session)return;try{const result=await alertsApi({action:"list"});for(const a of result.alerts||[]){if(!knownAlertIds.has(a.id)&&knownAlertIds.size&&Notification.permission==="granted")new Notification(a.title,{body:a.body,tag:a.id});knownAlertIds.add(a.id)}alerts=result.alerts||[];if(model)render()}catch(_){}}
async function enableNotifications(){if(!("Notification" in window))return alert("Browser notifications are not supported here.");await Notification.requestPermission();await loadAlerts();}
async function openAlert(id){const a=alerts.find(x=>x.id===id);if(!a)return;try{await alertsApi({action:"read",alert_id:id})}catch(_){}if(a.action_path==="leads.html"&&a.payload?.lead_id){editingLeadId=a.payload.lead_id;render()}else if(a.action_path)window.open(a.action_path,"_blank","noopener");}
async function load(){app.innerHTML=`<div class="loading"><span class="spinner"></span>${t("loading")}</div>`;try{const code=model?.call_center_code;model=await api({action:"list",call_center_code:code,status:selectedStatus});editingLeadId=null;await loadAlerts();render();}catch(e){login(e.message||t("error"));}}
function chooseClient(code){if(!model||code===model.call_center_code)return;model.call_center_code=code;load();}
function chooseStatus(status){selectedStatus=status;load();}
function chooseQueue(queue){selectedQueue=queue;render();}
function statusText(s){return t(s==="won"?"wonStatus":s)||esc(s);}
function row(l){const temperature=l.temperature?`<span class="pill temp-${esc(l.temperature)}">${t(l.temperature==='hot'?'hotTemp':l.temperature)}</span>`:t("none"),status=l.status||"new",overdue=active(l)&&l.follow_up_at&&new Date(l.follow_up_at)<new Date();const edit=editingLeadId===l.id?editor(l):"";return `<tr><td><div class="customer">${esc(l.customer_name||t("unknown"))}</div><div class="muted">${esc(l.phone_number||l.whatsapp_user_id||t("none"))}</div></td><td>${esc(l.product_interest||t("none"))}${l.summary?`<div class="muted">${esc(l.summary)}</div>`:""}</td><td>${temperature}</td><td>${esc(l.assigned_to||t("unassigned"))}</td><td>${esc(l.next_action||t("none"))}${l.follow_up_at?`<div class="muted ${overdue?"overdue":""}">${overdue?"⚠ ":""}${fmt(l.follow_up_at)}</div>`:""}</td><td><span class="pill status-${esc(status)}">${statusText(status)}</span>${l.lost_reason?`<div class="muted">${esc(l.lost_reason)}</div>`:""}</td><td><button class="edit" onclick="editLead('${l.id}')">${t("edit")}</button></td></tr>${edit}`;}
function editor(l){const statuses=["new","qualified","contacted","follow_up","won","lost"];return `<tr class="editor"><td colspan="7"><div class="editor-box"><label>${t("owner")}<input id="owner-${l.id}" maxlength="120" value="${esc(l.assigned_to||"")}" placeholder="${t("unassigned")}"></label><label>${t("status")}<select id="status-${l.id}">${statuses.map(s=>`<option value="${s}" ${s===l.status?"selected":""}>${statusText(s)}</option>`).join("")}</select></label><label>${t("followUp")}<input id="follow-${l.id}" type="datetime-local" value="${localInput(l.follow_up_at)}"></label><label>${t("action")}<input id="action-${l.id}" maxlength="1000" value="${esc(l.next_action||"")}"></label><label>${t("lostReason")}<input id="reason-${l.id}" maxlength="500" value="${esc(l.lost_reason||"")}"></label><div class="editor-actions"><button class="save" onclick="saveLead('${l.id}')">${t("save")}</button><button class="cancel" onclick="cancelEdit()">${t("cancel")}</button></div></div></td></tr>`;}
function render(){const leads=(model.leads||[]).filter(inQueue),clients=model.clients||[],all=clients.length?clients:[{call_center_code:model.call_center_code,display_name:model.call_center_code}],clientOptions=all.map(c=>`<option value="${esc(c.call_center_code)}" ${c.call_center_code===model.call_center_code?"selected":""}>${esc(c.display_name||c.call_center_code)}</option>`).join(""),statuses=["all","new","qualified","contacted","follow_up","won","lost"],statusOptions=statuses.map(s=>`<option value="${s}" ${s===selectedStatus?"selected":""}>${s==="all"?t("all"):statusText(s)}</option>`).join(""),queues=["all","due_today","overdue","unassigned"],queueOptions=queues.map(q=>`<option value="${q}" ${q===selectedQueue?"selected":""}>${t(q==="all"?"allQueues":q)}</option>`).join(""),allLeads=model.leads||[],hot=allLeads.filter(l=>l.temperature==="hot").length,overdue=allLeads.filter(l=>active(l)&&l.follow_up_at&&new Date(l.follow_up_at)<new Date()).length,won=allLeads.filter(l=>l.status==="won").length,unread=alerts.filter(a=>a.status!=="read").length,alertList=alerts.slice(0,5).map(a=>`<button class="edit" style="margin:4px" onclick="openAlert('${a.id}')">⚠ ${esc(a.title)} — ${esc(a.body)}</button>`).join("");app.innerHTML=`<header class="top"><div class="brand">${logo}<span>Shareek <em>Leads</em></span></div><span class="sub">${t("subtitle")} ${fmt(model.generated_at)}</span><div class="top-actions"><button class="ghost" onclick="enableNotifications()">🔔 ${unread||""}</button><div class="langtoggle"><button class="${lang==='ar'?'active':''}" onclick="setLang('ar')">العربية</button><button class="${lang==='en'?'active':''}" onclick="setLang('en')">English</button></div><button class="ghost" onclick="logout()">${t("logout")}</button></div></header><main class="wrap"><div class="page-head"><div><h1>${t("leads")}</h1><p>${esc(all.find(c=>c.call_center_code===model.call_center_code)?.display_name||model.call_center_code||"")}</p></div></div>${alertList?`<section class="filters"><b>🔔 ${unread} alerts</b>${alertList}</section>`:""}<section class="filters"><div class="filter"><label for="client">${t("client")}</label><select id="client" onchange="chooseClient(this.value)">${clientOptions}</select></div><div class="filter filter-status"><label for="status">${t("status")}</label><select id="status" onchange="chooseStatus(this.value)">${statusOptions}</select></div><div class="filter filter-status"><label for="queue">${t("queue")}</label><select id="queue" onchange="chooseQueue(this.value)">${queueOptions}</select></div><button class="refresh" onclick="load()">↻ ${t("refresh")}</button></section><section class="kpis"><div class="kpi"><div class="k-label">${t("total")}</div><div class="k-val">${leads.length}</div><div class="k-sub">${t("all")}</div></div><div class="kpi"><div class="k-label">${t("hot")}</div><div class="k-val">${hot}</div><div class="k-sub">${t("hotTemp")}</div></div><div class="kpi"><div class="k-label">${t("overdue")}</div><div class="k-val">${overdue}</div><div class="k-sub">${t("queue")}</div></div><div class="kpi"><div class="k-label">${t("won")}</div><div class="k-val">${won}</div><div class="k-sub">${t("wonStatus")}</div></div></section><section class="table-card">${leads.length?`<div class="scroll"><table class="leads"><thead><tr><th>${t("customer")}</th><th>${t("interest")}</th><th>${t("priority")}</th><th>${t("owner")}</th><th>${t("action")}</th><th>${t("status")}</th><th>${t("edit")}</th></tr></thead><tbody>${leads.map(row).join("")}</tbody></table></div>`:`<div class="empty"><span class="empty-icon">🎯</span><b>${t("noLeads")}</b><div class="muted">${t("noLeadsHint")}</div></div>`}</section></main>`;}
function editLead(id){editingLeadId=id;render();}
function cancelEdit(){editingLeadId=null;render();}
async function saveLead(id){const value=s=>document.getElementById(`${s}-${id}`).value.trim(),follow=document.getElementById(`follow-${id}`).value;try{await api({action:"update",call_center_code:model.call_center_code,lead_id:id,assigned_to:value("owner")||null,status:value("status"),next_action:value("action")||null,follow_up_at:follow?new Date(follow).toISOString():null,lost_reason:value("reason")||null});await load();}catch(e){alert(e.message||t("error"));}}
function logout(){session=null;model=null;selectedStatus="all";login();}
login();
setInterval(()=>{if(session)loadAlerts()},30000);
</script></body></html>
