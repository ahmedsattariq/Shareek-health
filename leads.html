<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shareek — Leads</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"><style>:root{--n:#0d1b2a;--c:#e8e6dd;--g:#2fa36b}*{box-sizing:border-box}body{margin:0;background:var(--c);color:var(--n);font-family:Cairo,Arial}.login{width:min(390px,calc(100% - 30px));margin:12vh auto;background:#fff;padding:30px;border-radius:18px;text-align:center;box-shadow:0 8px 30px #0002}.logo{font-size:26px;font-weight:700}.logo i{color:var(--g);font-style:normal}.login p{font-size:13px;color:#667}input,button,select{font:inherit}input{width:100%;padding:11px;margin-top:10px;border:1px solid #d3d1c7;border-radius:10px}.primary{width:100%;padding:11px;border:0;border-radius:10px;margin-top:12px;background:var(--g);color:#fff;font-weight:700}.error{min-height:18px;color:#c33;font-size:12px;margin-top:9px}header{background:var(--n);color:#fff;padding:15px}.wrap{max-width:1150px;margin:auto;padding:16px}button,select{padding:8px;border-radius:8px;border:1px solid #ccc;background:#fff}table{width:100%;min-width:850px;border-collapse:collapse;background:#fff}th{background:var(--n);color:#fff}td,th{padding:10px;text-align:right;border-bottom:1px solid #ddd;vertical-align:top}.scroll{overflow:auto;margin-top:12px}.muted{font-size:11px;color:#667}.pill{background:#e8edf4;border-radius:999px;padding:2px 8px;font-size:11px}</style><main id="app"></main><script>const SB='https://pxeiozmsfvmypcsqbcqv.supabase.co',API=SB+'/functions/v1/leads',ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4ZWlvemZ2bXlwY3NxYmNxdiIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzgyMDQyNTE3LCJleHAiOjIwOTc2MTg1MTd9.s23PCgc_HuGRUSdN3hMNXBsdsavofLBIZj3Ppq5lP94';let s,m,f='all';const a=document.querySelector('#app'),e=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function login(x=''){a.innerHTML=`<section class=login><div class=logo>Shareek <i>Leads</i></div><p>سجل العملاء المحتملين</p><input id=em type=email placeholder="البريد الإلكتروني" autocomplete=email><input id=pw type=password placeholder="كلمة المرور" autocomplete=current-password onkeydown="if(event.key==='Enter')go()"><button class=primary onclick=go()>تسجيل الدخول</button><div class=error>${e(x)}</div></section>`}async function q(x){let r=await fetch(API,{method:'POST',headers:{apikey:ANON,authorization:'Bearer '+s.access_token,'content-type':'application/json'},body:JSON.stringify(x)}),j=await r.json();if(!r.ok)throw Error(j.error);return j}async function go(){let r=await fetch(SB+'/auth/v1/token?grant_type=password',{method:'POST',headers:{apikey:ANON,'content-type':'application/json'},body:JSON.stringify({email:em.value,password:pw.value})});if(!r.ok)return login('البريد أو كلمة المرور غير صحيحة');s=await r.json();load()}async function load(){try{m=await q({action:'list',call_center_code:m?.call_center_code,status:f});draw()}catch(x){login(x.message)}}function draw(){let ls=m.leads||[],cs=m.clients||[],n={new:'جديد',qualified:'مؤهل',contacted:'تم التواصل',follow_up:'متابعة',won:'تم البيع',lost:'مفقود'};a.innerHTML=`<header><b>Shareek Leads</b></header><div class=wrap>${cs.length?`<select onchange="m.call_center_code=this.value;load()">${cs.map(c=>`<option value="${e(c.call_center_code)}" ${c.call_center_code===m.call_center_code?'selected':''}>${e(c.display_name||c.call_center_code)}</option>`).join('')}</select>`:''}<button onclick="f='all';load()">الكل</button><button onclick="f='follow_up';load()">متابعة</button><div class=scroll><table><tr><th>العميل</th><th>الطلب</th><th>الأولوية</th><th>الخطوة التالية</th><th>الحالة</th></tr>${ls.map(l=>`<tr><td><b>${e(l.customer_name||'غير معروف')}</b><br>${e(l.phone_number||l.whatsapp_user_id||'—')}</td><td>${e(l.product_interest||'—')}<br><span class=muted>${e([l.location,l.budget,l.timeframe].filter(Boolean).jo
