<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shareek Leads</title><style>body{margin:0;background:#e8e6dd;color:#0d1b2a;font:15px Arial}header{background:#0d1b2a;color:white;padding:16px;font-size:20px;font-weight:bold}.box{max-width:1150px;margin:22px auto;padding:0 14px}input,select,button{padding:9px;margin:4px;border:1px solid #ccc;border-radius:7px}button{cursor:pointer}.login{max-width:320px;margin:15vh auto;background:white;padding:24px;border-radius:12px}table{background:white;border-collapse:collapse;width:100%;margin-top:12px}th{background:#0d1b2a;color:white}td,th{padding:10px;text-align:right;border-bottom:1px solid #ddd;vertical-align:top}.muted{color:#667;font-size:12px}.pill{background:#e7eef7;border-radius:12px;padding:3px 8px;font-size:12px}.hot{background:#ffdeda}.warm{background:#fff0cc}.cold{background:#e4f1fc}</style><main id="app"></main><script>const SB='https://pxeiozmsfvmypcsqbcqv.supabase.co',API=SB+'/functions/v1/leads',ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXAiLCJyZWYiOiJweGVpb3ptc2Z2bXlwY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDI1MTcsImV4cCI6MjA5NzYxODUxN30.s23PCgc_HuGRUSdN3hMNXBsdsavofLBIZjN3hMNXBsdsavofLBIZj3Ppq5lP94';let s,m,f='all';const a=document.querySelector('#app'),e=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function login(x=''){a.innerHTML=`<div class="login"><h2>Shareek Leads</h2><input id="em" placeholder="البريد الإلكتروني"><input id="pw" type="password" placeholder="كلمة المرور"><button onclick="go()">دخول</button><p>${e(x)}</p></div>`}async function q(x){let r=await fetch(API,{method:'POST',headers:{apikey:ANON,authorization:'Bearer '+s.access_token,'content-type':'application/json'},body:JSON.stringify(x)}),j=await r.json();if(!r.ok)throw Error(j.error);return j}async function go(){let r=await fetch(SB+'/auth/v1/token?grant_type=password',{method:'POST',headers:{apikey:ANON,'content-type':'application/json'},body:JSON.stringify({email:em.value,password:pw.value})});if(!r.ok)return login('بيانات الدخول غير صحيحة');s=await r.json();load()}async function load(){try{m=await q({action:'list',call_center_code:m?.call_center_code,status:f});draw()}catch(x){login(x.message)}}function draw(){let ls=m.leads||[],cs=m.clients||[],name={new:'جديد',qualified:'مؤهل',contacted:'تم التواصل',follow_up:'متابعة',won:'تم البيع',lost:'مفقود'},row=l=>`<tr><td><b>${e(l.customer_name||'غير معروف')}</b><br><span dir=ltr>${e(l.phone_number||l.whatsapp_user_id||'—')}</span></td><td>${e(l.product_interest||'—')}<br><i class=muted>${e([l.location,l.budget,l.timeframe].filter(Boolean).join(' · '))}</i><br>${e(l.summary||'')}</td><td><span class="pill ${l.temperature||''}">${e(l.temperature||'—')}</span></td><td>${e(l.next_action||'—')}</td><td><span class=pill>${name[l.status]||e(l.status)}</span><br><button onclick="edit('${l.id}','${l.status}')">تعديل</button></td></tr>`;a.innerHTML=`<header>Shareek — العملاء المحتملون</header><div class=box>${cs.length?`<select onchange="m.call_center_code=this.value;load()">${cs.map(c=>`<option value="${e(c.call_center_code)}" ${c.call_center_code===m.call_center_code?'selected':''}>${e(c.display_name||c.call_center_code)}</option>`).join('')}</select>`:''}<button onclick="load()">تحديث</button><button onclick="f='all';load()">الكل (${ls.length})</button><button onclick="f='follow_up';load()">متابعة</button><table><tr><th>العميل</th><th>الطلب</th><th>الأولوية</th><th>الخطوة التالية</th><th>الحالة</th></tr>${ls.map(row).join('')}</table></div>`}async function edit(id,current){let status=prompt('new / qualified / contacted / follow_up / won / lost',current);if(!status)return;let next=prompt('الخطوة التالية');await q({action:'update',lead_id:id,call_center_code:m.call_center_code,status,next_action:next||''});load()}login()</script></html>
