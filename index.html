<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shareek — Recording Health</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --navy:#0D1B2A; --cream:#E8E6DD; --cream2:#D3D1C7; --green:#4CAF7D;
  --gGreen:#2FA36B; --gAmber:#E0A100; --gRed:#D64545; --grey:#8a8f98; }
* { box-sizing:border-box; }
body { margin:0; background:var(--cream); color:var(--navy); font-family:Poppins,Cairo,sans-serif; }
[dir=rtl] body { font-family:Cairo,Poppins,sans-serif; }
h1,h2 { font-weight:700; }
.wrap { max-width:1100px; margin:0 auto; padding:16px; }
header.top { background:var(--navy); color:var(--cream); padding:14px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
header.top h1 { margin:0; font-size:22px; }
header.top span.sub { opacity:.7; font-size:13px; flex:1; }
header.top button { background:var(--green); color:#fff; border:0; border-radius:8px; padding:8px 16px; font-weight:600; cursor:pointer; font-size:13px; font-family:inherit; }
header.top button.ghost { background:transparent; border:1px solid rgba(255,255,255,.35); }
.langtoggle { display:inline-flex; border:1px solid rgba(255,255,255,.35); border-radius:8px; overflow:hidden; }
.langtoggle button { background:transparent; color:var(--cream); border:0; border-radius:0; padding:7px 12px; font-weight:600; cursor:pointer; font-size:13px; font-family:inherit; }
.langtoggle button.active { background:var(--green); color:#fff; }

/* ---- login ---- */
.login { max-width:360px; margin:12vh auto; background:#fff; border-radius:16px; padding:28px 26px; box-shadow:0 4px 20px rgba(13,27,42,.15); text-align:center; }
.login h1 { margin:0 0 4px; font-size:24px; }
.login p { color:#666; font-size:13px; margin:0 0 18px; }
.login input { width:100%; padding:12px 14px; border:1px solid var(--cream2); border-radius:10px; font-size:16px; font-family:inherit; text-align:center; }
.login button { width:100%; margin-top:12px; background:var(--green); color:#fff; border:0; border-radius:10px; padding:12px; font-weight:700; font-size:15px; cursor:pointer; font-family:inherit; }
.login .err { color:var(--gRed); font-size:13px; min-height:18px; margin-top:10px; font-weight:600; }
.login .lang { margin-top:16px; }
.login .lang a { color:#274b7a; font-size:12px; text-decoration:none; cursor:pointer; margin:0 6px; }
.login .forgot { margin-top:12px; }
.login .forgot a { color:#274b7a; font-size:12px; text-decoration:none; cursor:pointer; margin:0 6px; }
.login .info { color:var(--gGreen); font-size:12px; margin:0 0 8px; font-weight:600; }

/* ---- overview cards ---- */
.overview { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin:16px 0; }
.ccard { background:#fff; border-radius:12px; padding:14px 16px; box-shadow:0 1px 4px rgba(13,27,42,.12); cursor:pointer; border:2px solid transparent; }
.ccard.sel { border-color:var(--green); }
.ccard .name { font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
.ccard .row { display:flex; justify-content:space-between; font-size:13px; margin-top:8px; }
.ccard .row span:last-child { font-weight:600; }
.ccard .att { color:var(--gRed); font-weight:700; }
.ccard .clean { color:var(--gGreen); font-weight:700; }

/* ---- tabs ---- */
.tabs { display:flex; gap:6px; flex-wrap:wrap; margin:6px 0 14px; }
.tabs button { background:#fff; color:var(--navy); border:1px solid var(--cream2); border-radius:999px; padding:6px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
.tabs button.active { background:var(--navy); color:var(--cream); border-color:var(--navy); }
.tabs button .badge { display:inline-block; margin-inline-start:6px; background:var(--gRed); color:#fff; border-radius:999px; padding:0 6px; font-size:11px; }

/* ---- table ---- */
table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; font-size:13px; box-shadow:0 1px 4px rgba(13,27,42,.12); }
th { background:var(--navy); color:var(--cream); text-align:start; padding:8px 10px; font-weight:600; white-space:nowrap; }
td { padding:8px 10px; border-top:1px solid var(--cream2); vertical-align:middle; }
tr:hover td { background:#f6f5f0; }
tr.dark td { background:#fcf1f1; }
tr.muted td { color:#999; }
.scroll { overflow-x:auto; margin-bottom:24px; }
.dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-inline-end:6px; vertical-align:middle; }
.sub { color:#777; font-size:11px; }
.att-pill { display:inline-block; background:#fbe0dd; color:#c0392b; border-radius:999px; padding:1px 8px; font-size:11px; font-weight:700; }
.note { font-size:12px; color:#666; margin:6px 0 14px; }
.empty { padding:22px; text-align:center; color:#777; background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(13,27,42,.12); }
#loading { text-align:center; padding:40px; font-size:15px; }
h2 .att { color:var(--gRed); }
.addform { display:flex; gap:8px; flex-wrap:wrap; align-items:center; background:#fff; padding:14px; border-radius:12px; box-shadow:0 1px 4px rgba(13,27,42,.12); margin-bottom:24px; }
.addform input, .addform select { padding:9px 11px; border:1px solid var(--cream2); border-radius:8px; font-family:inherit; font-size:13px; }
.addform button { background:var(--green); color:#fff; border:0; border-radius:8px; padding:9px 16px; font-weight:600; cursor:pointer; font-family:inherit; font-size:13px; }
td.acts { white-space:nowrap; }
td.acts button { background:var(--navy); color:var(--cream); border:0; border-radius:7px; padding:5px 10px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; margin-inline-end:5px; }
td.acts button.danger { background:#c0392b; color:#fff; }

/* ---- analytics (ported from dashboard.html) ---- */
.cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin:16px 0; }
.agent { background:#fff; border-radius:12px; padding:14px 16px; box-shadow:0 1px 4px rgba(13,27,42,.12); }
.agent b { font-size:16px; }
.agent .row { display:flex; justify-content:space-between; font-size:13px; margin-top:6px; }
.agent .row span:last-child { font-weight:600; }
.ok { color:var(--green); font-weight:700; } .bad { color:#c0392b; font-weight:700; }
.pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
.pill.sim { background:var(--cream2); } .pill.wa { background:#d9f2e4; color:#1d7a4d; }
audio { height:30px; max-width:230px; }
.score { display:inline-block; min-width:34px; text-align:center; padding:2px 7px; border-radius:8px; font-weight:700; font-size:12px; color:#fff; }
.pill.sent-happy { background:#d9f2e4; color:#1d7a4d; } .pill.sent-neutral { background:var(--cream2); }
.pill.sent-frustrated { background:#fbe0dd; color:#c0392b; }
.pill.lead { background:#e6ecf5; color:#274b7a; }
.pill.noans { background:#fbe0dd; color:#c0392b; }
tr.no-answer td { background:#fcf4f3; }
body.hide-no-answer tr.no-answer { display:none; }
.toggle { font-size:12px; color:#666; display:inline-flex; align-items:center; gap:6px; margin:0 0 10px; cursor:pointer; }
.topics { color:#555; font-size:11px; }
details.insight { margin-top:5px; }
details.insight summary { cursor:pointer; font-size:12px; color:#274b7a; font-weight:600; }
details.insight .body { margin-top:6px; font-size:12px; }
details.insight .body b { display:block; margin-top:6px; }
details.insight ul { margin:4px 0; padding-inline-start:18px; }
.transcript { direction:rtl; text-align:right; white-space:pre-wrap; background:#f6f5f0; border-radius:8px;
  padding:8px 10px; max-height:220px; overflow:auto; font-size:12px; line-height:1.5; }
</style>

  el.lang = lang;

}

  if (l === lang) return;
  lang = l;

  applyLang();
  route();

// short "3h" / "2d" style age from an ISO time
function ago(iso) {
  if (!iso) return "";
  const m = (Date.now() - new Date(iso).getTime()) / 60000;
  if (m < 60) return Math.max(1, Math.round(m)) + t("minutes");
  if (m < 60 * 24) return Math.round(m / 60) + t("hours");
  return Math.round(m / 1440) + t("days");
}

const GREEN = "var(--gGreen)", AMBER = "var(--gAmber)", RED = "var(--gRed)", GREY = "var(--grey)";
const dot = c => `<span class="dot" style="background:${c}"></span>`;

// ---- status helpers ----------------------------------------------------------
function statusMeta(s) {
  switch (s) {
    case "healthy":       return { c:GREEN, label:t("stHealthy") };
    case "offline":       return { c:RED,   label:t("stOffline") };
    case "dark":          return { c:RED,   label:t("stDark") };
    case "not_recording": return { c:RED,   label:t("stNotRec") };
    case "paused":        return { c:GREY,  label:t("stPaused") };
    case "retired":       return { c:GREY,  label:t("stRetired") };
    default:              return { c:GREY,  label:esc(s) };
  }
}
const needsAttention = p =>
  ["offline", "dark", "not_recording"].includes(p.status) || p.low_battery || p.low_storage;

function rollup(client) {
  let online = 0, attention = 0, active = 0;
  for (const p of client.phones) {
    if (p.roster_status === "retired") continue;
    active++;
    if (p.status === "healthy") online++;
    if (needsAttention(p)) attention++;
  }
  return { online, attention, active };
}

function batteryCell(p) {
  if (p.battery_level == null) return `<td><span class="sub">—</span></td>`;
  const pct = p.battery_level, charging = !!p.battery_charging;
  let c = GREEN;
  if (pct < 30) c = AMBER;
  if (pct < 15 && !charging) c = RED;
  return `<td>${dot(c)}${pct}%${charging ? " 🔌" : ""}</td>`;
}
function storageCell(p) {
  if (p.storage_free_mb == null) return `<td><span class="sub">—</span></td>`;
  const mb = p.storage_free_mb;
  const c = mb < 300 ? RED : mb < 1024 ? AMBER : GREEN;
  const txt = mb >= 1024 ? (mb / 1024).toFixed(1) + " GB" : mb + " MB";
  return `<td>${dot(c)}${txt}</td>`;
}

function phoneTable(client) {
  if (!client.phones.length) return `<div class="empty">${t("emptyPhones")}</div>`;
  // worst-first: attention on top, then offline/dark, then rest; paused/retired last
  const rank = p => (needsAttention(p) ? 0 : p.status === "paused" || p.status === "retired" ? 2 : 1);
  const phones = [...client.phones].sort((a, b) => rank(a) - rank(b));
  const rows = phones.map(p => {
    const m = statusMeta(p.status);
    const muted = p.status === "paused" || p.status === "retired";
    const darkNote = p.status === "dark" && p.reported_at
      ? ` <span class="sub">(${t("lastSeen")} ${t("ago")} ${ago(p.reported_at)})</span>` : "";
    const name = p.label || p.agent_name || p.install_id.slice(0, 8);
    const subtitle = p.label && p.agent_name ? p.agent_name : "";
    return `<tr class="${p.status === "dark" ? "dark" : ""}${muted ? " muted" : ""}">
      <td>${esc(name)}${subtitle ? `<br><span class="sub">${esc(subtitle)}</span>` : ""}</td>
      <td>${dot(m.c)}${m.label}${darkNote}</td>
      ${batteryCell(p)}
      ${storageCell(p)}
      <td>${p.last_recording_at ? fmtTime(p.last_recording_at) : t("never")}</td>
      <td>${p.reported_at ? fmtTime(p.reported_at) : "—"}</td>
      <td><span class="sub">${esc(p.device_model || "")}${p.app_version ? " · v" + esc(p.app_version) : ""}</span></td>
    </tr>`;
  }).join("");
  return `<div class="scroll"><table>
    <tr><th>${t("colPhone")}</th><th>${t("colStatus")}</th><th>${t("colBattery")}</th><th>${t("colStorage")}</th>
        <th>${t("colLastRec")}</th><th>${t("colLastCheckin")}</th><th>${t("colDevice")}</th></tr>
    ${rows}</table></div>`;
}

function showForgot() {
  const pre = document.getElementById("email")?.value || document.getElementById("fp_email")?.value || "";
  forgotRequestScreen("", pre.trim());
}

async function sendResetCode() {
  const email = (document.getElementById("fp_email")?.value || "").trim();
  if (!email) return;
  let res;
  try {
    res = await fetch(SB + "/auth/v1/recover", {
      method: "POST", headers: { apikey: ANON, "content-type": "application/json" },
      body: JSON.stringify({ email }),
    });
  } catch (e) { return forgotRequestScreen(t("noConn"), email); }
  // Supabase returns success whether or not the email exists (no account enumeration).
  if (!res.ok && res.status !== 422) return forgotRequestScreen(t("serverError") + " (" + res.status + ")", email);
  forgotResetScreen(email, "", t("codeSent"));
}

async function submitReset() {
  const email = (document.getElementById("rp_email")?.value || "").trim();
  const token = (document.getElementById("rp_code")?.value || "").trim();
  const password = document.getElementById("rp_pw")?.value || "";
  if (!email || !token || !password) return;
  if (password.length < 6) return forgotResetScreen(email, t("pwTooShort"));
  // 1) verify the emailed code -> a fresh session
  let vres;
  try {
    vres = await fetch(SB + "/auth/v1/verify", {
      method: "POST", headers: { apikey: ANON, "content-type": "application/json" },
      body: JSON.stringify({ type: "recovery", email, token }),
    });
  } catch (e) { return forgotResetScreen(email, t("noConn")); }
  if (!vres.ok) return forgotResetScreen(email, t("badResetCode"));
  const s = await vres.json();
  // 2) set the new password using that session
  try {
    const ures = await fetch(SB + "/auth/v1/user", {
      method: "PUT",
      headers: { apikey: ANON, Authorization: "Bearer " + s.access_token, "content-type": "application/json" },
      body: JSON.stringify({ password }),
    });
    if (!ures.ok) return forgotResetScreen(email, t("serverError") + " (" + ures.status + ")");
  } catch (e) { return forgotResetScreen(email, t("noConn")); }
  // 3) already signed in with the fresh session — straight into the dashboard
  session = { access_token: s.access_token, refresh_token: s.refresh_token };
  await load(true);
}

async function signIn() {
  const email = (document.getElementById("email")?.value || "").trim();
  const password = document.getElementById("password")?.value || "";
  if (!email || !password) return;
  let res;
  try {
    res = await fetch(SB + "/auth/v1/token?grant_type=password", {
      method: "POST",
      headers: { apikey: ANON, "content-type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
  } catch (e) { return loginScreen(t("noConn")); }
  if (!res.ok) return loginScreen(t("badCreds"));
  const s = await res.json();
  session = { access_token: s.access_token, refresh_token: s.refresh_token };
  await load(true);
}

// Swap an expired access token for a fresh one using the refresh token. Returns success.
async function refreshSession() {
  if (!session?.refresh_token) return false;
  try {
    const res = await fetch(SB + "/auth/v1/token?grant_type=refresh_token", {
      method: "POST", headers: { apikey: ANON, "content-type": "application/json" },
      body: JSON.stringify({ refresh_token: session.refresh_token }),
    });
    if (!res.ok) return false;
    const s = await res.json();
    session = { access_token: s.access_token, refresh_token: s.refresh_token };
    return true;
  } catch (e) { return false; }
}

async function load(fromLogin, retried) {
  if (!session) return loginScreen();
  if (fromLogin) app.innerHTML = `<div id="loading">${t("loading")}</div>`;
  let res;
  try {
    res = await fetch(API, {
      method: "POST",
      headers: { apikey: ANON, Authorization: "Bearer " + session.access_token, "content-type": "application/json" },
      body: JSON.stringify({}),
    });
  } catch (e) {
    if (fromLogin) loginScreen(t("noConn"));
    return;
  }
  if (res.status === 401) {
    // access token likely expired — try one silent refresh, else send back to login
    if (!retried && await refreshSession()) return load(fromLogin, true);
    session = null; stopTimer(); return loginScreen(t("badCreds"));
  }
  if (res.status === 403) { session = null; stopTimer(); return loginScreen(t("noAccess")); }
  if (!res.ok) { if (fromLogin) loginScreen(t("serverError") + " (" + res.status + ")"); return; }
  data = await res.json();
  // default selected tab = worst client
  if (!selectedCode || !data.clients.some(c => c.call_center_code === selectedCode)) {
    const sorted = sortedClients();
    selectedCode = sorted.length ? sorted[0].call_center_code : null;
  }
  startTimer();
  render();
}

function sortedClients() {
  return [...(data.clients || [])].sort((a, b) => {
    const ra = rollup(a), rb = rollup(b);
    if (rb.attention !== ra.attention) return rb.attention - ra.attention; // most attention first
    return ra.online - rb.online;
  });
}

function render() {
  applyLang();
  const isMaster = data.role === "master";
  const clients = data.clients || [];
  const sorted = sortedClients();

  const header = `<header class="top"><h1>Shareek</h1>
    <span class="sub">${t("title")} · ${t("subtitle")} ${fmtTime(data.generated_at)}</span>
    <div class="langtoggle">
      <button class="${lang === "ar" ? "active" : ""}" onclick="setLang('ar')">العربية</button>
      <button class="${lang === "en" ? "active" : ""}" onclick="setLang('en')">English</button>
    </div>
    ${!adminMode && !analyticsMode ? `<button onclick="load()">${t("refresh")}</button>` : ""}
    ${isMaster ? (adminMode
      ? `<button class="ghost" onclick="closeAccounts()">${t("backToHealth")}</button>`
      : analyticsMode
      ? `<button class="ghost" onclick="closeAnalytics()">${t("backToHealth")}</button>`
      : `<button class="ghost" onclick="openAccounts()">${t("accounts")}</button>
         <button class="ghost" onclick="openAnalytics()">${t("analytics")}</button>`) : ""}
    <button class="ghost" onclick="logout()">${t("logout")}</button>
  </header>`;

  if (adminMode && isMaster) {
    app.innerHTML = header + `<div class="wrap">${adminPanel()}</div>`;
    return;
  }

  if (analyticsMode && isMaster) {
    app.innerHTML = header + `<div class="wrap">${analyticsPanel()}</div>`;
    return;
  }

  if (!clients.length) {
    app.innerHTML = header + `<div class="wrap"><div class="empty">${t("noClients")}</div></div>`;
    return;
  }

  let body = "";

  if (isMaster) {
    // overview cards (clickable) + tab bar
    const cards = sorted.map(c => {
      const r = rollup(c);
      const light = r.attention ? RED : GREEN;
      const name = c.display_name || c.call_center_code;
      return `<div class="ccard ${c.call_center_code === selectedCode ? "sel" : ""}"
        onclick="selectClient('${esc(c.call_center_code)}')">
        <div class="name">${dot(light)}${esc(name)}</div>
        <div class="row"><span>${t("onlineWord")}</span><span>${r.online}/${r.active} ${t("phonesWord")}</span></div>
        <div class="row"><span>${t("needAttention")}</span>
          <span class="${r.attention ? "att" : "clean"}">${r.attention || t("allGood")}</span></div>
      </div>`;
    }).join("");

    const tabs = sorted.map(c => {
      const r = rollup(c);
      const name = c.display_name || c.call_center_code;
      return `<button class="${c.call_center_code === selectedCode ? "active" : ""}"
        onclick="selectClient('${esc(c.call_center_code)}')">${esc(name)}${r.attention
          ? `<span class="badge">${r.attention}</span>` : ""}</button>`;
    }).join("");

    const sel = clients.find(c => c.call_center_code === selectedCode);
    body = `<div class="wrap">
      <h2>${t("clients")}</h2>
      <div class="overview">${cards}</div>
      <div class="tabs">${tabs}</div>
      ${sel ? clientSection(sel) : ""}
    </div>`;
  } else {
    // supervisor: just their one client
    body = `<div class="wrap">${clientSection(clients[0])}</div>`;
  }

  app.innerHTML = header + body;
}

function clientSection(c) {
  const r = rollup(c);
  const name = c.display_name || c.call_center_code;
  return `<h2>${esc(name)}${r.attention
    ? ` — <span class="att">${r.attention} ${t("needAttention")}</span>` : ""}</h2>
    <p class="note">${t("note")}</p>
    ${phoneTable(c)}`;
}

// ---- controls ----------------------------------------------------------------
function selectClient(cc) { selectedCode = cc; render(); }
function logout() { session = null; data = null; selectedCode = null; stopTimer(); loginScreen(); }
function startTimer() { stopTimer(); timer = setInterval(() => { if (session) load(); }, REFRESH_MS); }
function stopTimer() { if (timer) { clearInterval(timer); timer = null; } }
function route() { if (session && data) render(); else loginScreen(); }

// ---- Accounts panel (master only) --------------------------------------------
function adminPanel() {
  if (!adminData) return `<div id="loading">${t("loading")}</div>`;
  const clients = adminData.clients || [];
  const users = adminData.users || [];
  const clientName = code => (clients.find(c => c.call_center_code === code)?.display_name) || code || "—";
  const rows = users.map(u => {
    const em = esc(u.email || "");
    const isM = u.role === "master";
    const scope = isM ? `<span class="sub">${t("allClientsTag")}</span>` : esc(clientName(u.call_center_code));
    const status = u.active ? `<span class="clean">${t("statusActive")}</span>` : `<span class="att">${t("statusDisabled")}</span>`;
    return `<tr>
      <td>${em}</td>
      <td>${isM ? t("roleMaster") : t("roleSupervisor")}</td>
      <td>${scope}</td>
      <td>${status}</td>
      <td class="acts">
        <button onclick="resetPw('${em}')">${t("resetBtn")}</button>
        <button onclick="toggleActive('${em}',${u.active ? "false" : "true"})">${u.active ? t("disableBtn") : t("enableBtn")}</button>
        <button class="danger" onclick="delUser('${em}')">${t("deleteBtn")}</button>
      </td></tr>`;
  }).join("");
  const opts = clients.map(c => `<option value="${esc(c.call_center_code)}">${esc(c.display_name || c.call_center_code)}</option>`).join("");
  const clientRows = clients.map(c => {
    const active = c.active !== false;
    const cc = esc(c.call_center_code);
    const nm = c.display_name ? esc(c.display_name) : `<span class="sub">—</span>`;
    const status = active ? `<span class="clean">${t("statusActive")}</span>` : `<span class="att">${t("inactiveTag")}</span>`;
    return `<tr class="${active ? "" : "muted"}">
      <td>${nm}</td>
      <td><span class="sub">${cc}</span></td>
      <td>${c.phone_count ?? 0}</td>
      <td>${status}</td>
      <td class="acts">
        <button onclick="renameClient('${cc}')">${t("renameBtn")}</button>
        <button onclick="toggleClient('${cc}',${active ? "false" : "true"})">${active ? t("deactivateBtn") : t("activateBtn")}</button>
        <button class="danger" onclick="deleteClient('${cc}')">${t("deleteBtn")}</button>
      </td></tr>`;
  }).join("");
  return `
    <h2>${t("accountsTitle")}</h2>
    ${adminMsg ? `<p class="note" style="color:var(--gGreen);font-weight:600">${esc(adminMsg)}</p>` : ""}
    <div class="scroll"><table>
      <tr><th>${t("colEmail")}</th><th>${t("colRole")}</th><th>${t("colClient")}</th><th>${t("colActive")}</th><th></th></tr>
      ${rows}</table></div>
    <h2>${t("addTitle")}</h2>
    <div class="addform">
      <input id="nu_email" type="email" autocomplete="off" placeholder="${t("phEmail")}">
      <input id="nu_pw" type="text" autocomplete="off" placeholder="${t("phPassword")}">
      <select id="nu_client"><option value="">${t("pickClient")}</option>${opts}</select>
      <button onclick="addUser()">${t("addBtn")}</button>
    </div>
    <h2>${t("clientsTitle")}</h2>
    <div class="scroll"><table>
      <tr><th>${t("colName")}</th><th>${t("colCode")}</th><th>${t("colPhones")}</th><th>${t("colActive")}</th><th></th></tr>
      ${clientRows}</table></div>
    <h2>${t("addClientTitle")}</h2>
    <div class="addform">
      <input id="nc_code" type="text" autocomplete="off" placeholder="${t("phClientCode")}">
      <input id="nc_name" type="text" autocomplete="off" placeholder="${t("phClientName")}">
      <button onclick="addClient()">${t("addClientBtn")}</button>
    </div>`;
}

async function adminCall(payload, retried) {
  let res;
  try {
    res = await fetch(ADMIN_API, {
      method: "POST",
      headers: { apikey: ANON, Authorization: "Bearer " + session.access_token, "content-type": "application/json" },
      body: JSON.stringify(payload),
    });
  } catch (e) { return { ok: false, j: { error: t("noConn") } }; }
  if (res.status === 401 && !retried && await refreshSession()) return adminCall(payload, true);
  const j = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, j };
}

async function openAccounts() { adminMode = true; adminData = null; adminMsg = ""; render();
  const { ok, j } = await adminCall({ action: "list" });
  if (ok) adminData = j; else adminMsg = j.error || t("serverError");
  render();
}
function closeAccounts() { adminMode = false; adminMsg = ""; render(); }
async function refreshAdmin() { const { ok, j } = await adminCall({ action: "list" }); if (ok) adminData = j; render(); }

async function addUser() {
  const email = (document.getElementById("nu_email")?.value || "").trim();
  const password = document.getElementById("nu_pw")?.value || "";
  const code = document.getElementById("nu_client")?.value || "";
  if (!email || !password) return;
  adminMsg = t("saving"); render();
  const { ok, j } = await adminCall({ action: "add_user", email, password, call_center_code: code, role: "supervisor" });
  adminMsg = ok ? (j.created ? t("doneCreated") : t("doneUpdated")) : (j.error || t("serverError"));
  await refreshAdmin();
}
async function resetPw(email) {
  const pw = prompt(t("newPwPrompt") + " " + email + ":");
  if (!pw) return;
  adminMsg = t("saving"); render();
  const { ok, j } = await adminCall({ action: "set_password", email, password: pw });
  adminMsg = ok ? t("doneSaved") : (j.error || t("serverError")); render();
}
async function toggleActive(email, active) {
  adminMsg = t("saving"); render();
  const { ok, j } = await adminCall({ action: "set_active", email, active });
  adminMsg = ok ? t("doneSaved") : (j.error || t("serverError")); await refreshAdmin();
}
async function delUser(email) {
  if (!confirm(t("confirmDelete") + " " + email)) return;
  adminMsg = t("saving"); render();
  const { ok, j } = await adminCall({ action: "delete_user", email });
  adminMsg = ok ? t("doneSaved") : (j.error || t("serverError")); await refreshAdmin();
}
async function renameClient(code) {
  const cur = (adminData?.clients?.find(c => c.call_center_code === code)?.display_name) || "";
  const name = prompt(t("renamePrompt") + " " + code + ":", cur);
  if (name === null) return;
  adminMsg = t("saving"); render();
  const { ok, j } = await adminCall({ action: "rename_client", call_center_code: code, display_name: name });
  adminMsg = ok ? t("doneRenamed") : (j.error || t("serverError")); await refreshAdmin();
}
async function toggleClient(code, active) {
  adminMsg = t("saving"); render();
  const { ok, j } = await adminCall({ action: "set_client_active", call_center_code: code, active });
  adminMsg = ok ? t("doneSaved") : (j.error || t("serverError")); await refreshAdmin();
}
async function addClient() {
  const code = (document.getElementById("nc_code")?.value || "").trim();
  const name = (document.getElementById("nc_name")?.value || "").trim();
  if (!code) return;
  adminMsg = t("saving"); render();
  const { ok, j } = await adminCall({ action: "add_client", call_center_code: code, display_name: name });
  adminMsg = ok ? t("doneAdded") : (j.error || t("serverError")); await refreshAdmin();
}
async function deleteClient(code) {
  if (!confirm(t("confirmDeleteClient") + " (" + code + ")")) return;
  adminMsg = t("saving"); render();
  let { ok, j } = await adminCall({ action: "delete_client", call_center_code: code });
  if (!ok && j.hasPhones) {
    if (!confirm(t("confirmForceDeleteClient") + " (" + code + ")")) { adminMsg = ""; render(); return; }
    ({ ok, j } = await adminCall({ action: "delete_client", call_center_code: code, force: true }));
  }
  adminMsg = ok ? t("doneDeleted") : (j.error || t("serverError")); await refreshAdmin();
}

// ---- Analytics panel (master only) — call recordings + AI insights + missed calls ----
const scoreColor = s => s >= 80 ? "#1d7a4d" : s >= 60 ? "#b8860b" : s >= 40 ? "#d35400" : "#c0392b";
const sentClass = { happy:"sent-happy", neutral:"sent-neutral", frustrated:"sent-frustrated" };
const sentText = s => ({ happy:t("sentHappy"), neutral:t("sentNeutral"), frustrated:t("sentUpset") }[s] || esc(s));
const leadText = l => ({ interested:t("leadInterested"), needs_followup:t("leadFollowup"), closed:t("leadClosed"),
  not_interested:t("leadNotInterested"), na:"—" }[l] || esc(l));
const mins = sec => (sec ? Math.round(sec / 6) / 10 : 0) + " " + t("minUnit");

// One recording's insights cell: score + sentiment + lead + topics, with an
// expander for the summary, coaching tips, and full transcript.
function insightCell(r) {
  if (r.call_outcome === "no_answer") {
    const pill = `<span class="pill noans">${t("noAnswerPill")}</span>`;
    const check = r.transcript
      ? `<details class="insight"><summary>${t("check")}</summary>
        <div class="body"><div class="transcript">${esc(r.transcript)}</div></div></details>` : "";
    return pill + check;
  }
  const a = r.analysis;
  if (!a) return r.transcript ? `<small>${t("analyzing")}</small>`
    : (r.status === "cleaned" || r.status === "transcribed") ? `<small>${t("transcribing")}</small>` : "—";
  const score = typeof a.agent_score === "number"
    ? `<span class="score" style="background:${scoreColor(a.agent_score)}">${a.agent_score}</span>` : "";
  const sent = a.sentiment ? `<span class="pill ${sentClass[a.sentiment] || ""}">${sentText(a.sentiment)}</span>` : "";
  const lead = a.lead_outcome ? `<span class="pill lead">${leadText(a.lead_outcome)}</span>` : "";
  const topics = Array.isArray(a.topics) && a.topics.length
    ? `<div class="topics">${a.topics.map(esc).join(" · ")}</div>` : "";
  const coaching = Array.isArray(a.agent_coaching) && a.agent_coaching.length
    ? `<b>${t("coaching")}</b><ul>${a.agent_coaching.map(t2 => `<li>${esc(t2)}</li>`).join("")}</ul>` : "";
  const summary = a.summary ? `<b>${t("summary")}</b><div>${esc(a.summary)}</div>` : "";
  const transcript = r.transcript ? `<b>${t("transcript")}</b><div class="transcript">${esc(r.transcript)}</div>` : "";
  return `<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">${score}${sent}${lead}</div>${topics}
    <details class="insight"><summary>${t("details")}</summary>
      <div class="body">${summary}${coaching}${transcript}</div></details>`;
}

function analyticsPanel() {
  if (!analyticsData) return `<div id="loading">${t("loading")}</div>`;
  const recs = analyticsData.recordings || [];
  const misses = analyticsData.missed_calls || [];

  // per-agent scoreboard
  const agentsMap = new Map();
  const agg = n => { if (!agentsMap.has(n)) agentsMap.set(n, { calls:0, seconds:0, checked:0, passed:0, missed:0, back:0, cb:[], scores:[], leadCalls:0, won:0 }); return agentsMap.get(n); };
  for (const r of recs) {
    const a = agg(`${r.agent_name} (${r.call_center_code})`);
    a.calls++; a.seconds += r.duration_seconds || 0;
    if (r.self_check_passed !== null) { a.checked++; if (r.self_check_passed) a.passed++; }
    if (r.analysis) {
      if (typeof r.analysis.agent_score === "number") a.scores.push(r.analysis.agent_score);
      if (r.analysis.lead_outcome && r.analysis.lead_outcome !== "na") {
        a.leadCalls++; if (r.analysis.lead_outcome === "closed") a.won++;
      }
    }
  }
  for (const m of misses) {
    const a = agg(`${m.agent_name} (${m.call_center_code})`);
    a.missed++;
    if (m.called_back) { a.back++; if (m.callback_after_minutes != null) a.cb.push(+m.callback_after_minutes); }
  }
  const cards = [...agentsMap.entries()].map(([name, a]) => {
    const rate = a.missed ? Math.round(a.back / a.missed * 100) : null;
    const avg = a.cb.length ? (a.cb.reduce((x,y)=>x+y,0)/a.cb.length).toFixed(0) : null;
    const avgScore = a.scores.length ? Math.round(a.scores.reduce((x,y)=>x+y,0)/a.scores.length) : null;
    const conv = a.leadCalls ? Math.round(a.won / a.leadCalls * 100) : null;
    return `<div class="agent"><b>${esc(name)}</b>
      <div class="row"><span>${t("cRecorded")}</span><span>${a.calls}</span></div>
      <div class="row"><span>${t("cTalk")}</span><span>${mins(a.seconds)}</span></div>
      <div class="row"><span>${t("cScore")}</span><span>${avgScore === null ? "—" : `<span class="score" style="background:${scoreColor(avgScore)}">${avgScore}</span>`}</span></div>
      <div class="row"><span>${t("cConv")}</span><span>${conv === null ? "—" : conv + "% (" + a.won + "/" + a.leadCalls + ")"}</span></div>
      <div class="row"><span>${t("cCapture")}</span><span>${a.checked ? a.passed + "/" + a.checked + " " + t("okSuffix") : "—"}</span></div>
      <div class="row"><span>${t("cMissed")}</span><span>${a.missed}</span></div>
      <div class="row"><span>${t("cCalledBack")}</span><span>${rate === null ? "—" : rate + "%" + (avg ? " (~" + avg + " " + t("minUnit") + ")" : "")}</span></div>
    </div>`;
  }).join("") || `<div class="empty">${t("emptyAgents")}</div>`;

  const recRows = recs.map(r => `<tr class="${r.call_outcome === "no_answer" ? "no-answer" : ""}">
    <td>${esc(r.agent_name)}<br><span class="sub">${esc(r.call_center_code)}</span></td>
    <td>${fmtTime(r.started_at)}</td>
    <td>${mins(r.duration_seconds)}</td>
    <td><span class="pill ${r.call_type === "SIM" ? "sim" : "wa"}">${esc(r.call_type || "—")}</span></td>
    <td>${r.self_check_passed == null ? "—" : r.self_check_passed ? `<span class="ok">${t("captureOk")}</span>` : `<span class="bad">${t("captureSilent")}</span>`}</td>
    <td>${r.raw_dbfs != null ? esc(r.raw_dbfs) + " → <b>" + esc(r.clean_dbfs ?? "…") + "</b> dBFS" : (r.status === "uploaded" ? t("waitingCleanup") : "—")}</td>
    <td>${esc(r.status)}</td>
    <td>${insightCell(r)}</td>
    <td>${r.audio_url ? `<audio controls preload="none" src="${esc(r.audio_url)}"></audio>${r.audio_is_clean ? "" : `<br><span class="sub">${t("rawNotClean")}</span>`}` : "—"}</td>
  </tr>`).join("");

  const missRows = misses.map(m => `<tr>
    <td>${esc(m.agent_name)}<br><span class="sub">${esc(m.call_center_code)}</span></td>
    <td><span class="pill ${m.channel === "SIM" ? "sim" : "wa"}">${esc(m.channel)}</span></td>
    <td>${esc(m.channel === "SIM" ? (m.phone_number || t("hiddenNumber")) : (m.contact_name || t("unknown")))}</td>
    <td>${fmtTime(m.missed_at)}</td>
    <td>${m.channel !== "SIM" ? "—" : m.called_back
      ? `<span class="ok">${t("callbackAfterPre")} ${esc(m.callback_after_minutes)} ${t("minUnit")}</span>`
      : `<span class="bad">${t("callbackNot")}</span>`}</td>
  </tr>`).join("");

  return `
    ${analyticsMsg ? `<p class="note" style="color:var(--gGreen);font-weight:600">${esc(analyticsMsg)}</p>` : ""}
    <h2>${t("agents")}</h2>
    <div class="cards">${cards}</div>

    <h2>${t("recordedCalls")}</h2>
    <p class="note">${t("noteRecs")}</p>
    <label class="toggle"><input type="checkbox" ${document.body.classList.contains("hide-no-answer") ? "checked" : ""}
      onchange="document.body.classList.toggle('hide-no-answer', this.checked)">
      ${t("hideNoAnswer")}</label>
    <div class="scroll">${recs.length ? `<table>
      <tr><th>${t("colAgent")}</th><th>${t("colWhen")}</th><th>${t("colLength")}</th><th>${t("colType")}</th><th>${t("colCapture")}</th><th>${t("colQuality")}</th><th>${t("colStatus")}</th><th>${t("colInsights")}</th><th>${t("colListen")}</th></tr>
      ${recRows}</table>` : `<div class="empty">${t("emptyRecs")}</div>`}</div>

    <h2>${t("missed")}</h2>
    <p class="note">${t("noteMissed")}</p>
    <div class="scroll">${misses.length ? `<table>
      <tr><th>${t("colAgent")}</th><th>${t("colChannel")}</th><th>${t("colFrom")}</th><th>${t("colWhen")}</th><th>${t("colCalledBackQ")}</th></tr>
      ${missRows}</table>` : `<div class="empty">${t("emptyMissed")}</div>`}</div>`;
}

async function analyticsCall(retried) {
  let res;
  try {
    res = await fetch(ANALYTICS_API, {
      method: "POST",
      headers: { apikey: ANON, Authorization: "Bearer " + session.access_token, "content-type": "application/json" },
      body: JSON.stringify({}),
    });
  } catch (e) { return { ok: false, j: { error: t("noConn") } }; }
  if (res.status === 401 && !retried && await refreshSession()) return analyticsCall(true);
  const j = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, j };
}

async function openAnalytics() { analyticsMode = true; analyticsData = null; analyticsMsg = ""; render();
  const { ok, j } = await analyticsCall();
  if (ok) analyticsData = j; else analyticsMsg = j.error || t("serverError");
  render();
}
function closeAnalytics() { analyticsMode = false; analyticsMsg = ""; render(); }

applyLang();
loginScreen();
</script>
