<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Shareek — WhatsApp Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0D1B2A;--cream:#E8E6DD;--line:#D3D1C7;--green:#2FA36B;--red:#D64545;--amber:#E0A100;--muted:#69717b}
    *{box-sizing:border-box} body{margin:0;background:var(--cream);color:var(--navy);font-family:Cairo,Arial,sans-serif}
    button,input,select,textarea{font:inherit} button{cursor:pointer}.hidden{display:none!important}
    .login{width:min(390px,calc(100% - 30px));margin:12vh auto;background:#fff;border-radius:18px;padding:28px;box-shadow:0 8px 30px #0d1b2a22;text-align:center}
    .logo{font-size:25px;font-weight:700}.logo i{font-style:normal;color:var(--green)}.login p,.small{font-size:12px;color:var(--muted)}
    input,select,textarea{border:1px solid var(--line);border-radius:10px;padding:11px;width:100%;background:#fff;color:var(--navy)}.login input{margin-top:10px;text-align:right}
    .primary{background:var(--green);color:#fff;border:0;border-radius:10px;padding:11px 15px;font-weight:700}.login .primary{width:100%;margin-top:12px}.error{min-height:20px;color:var(--red);font-size:12px;margin-top:10px}
    header{height:66px;background:var(--navy);color:var(--cream);display:flex;align-items:center;padding:0 18px;gap:13px}.head-title{font-weight:700;font-size:18px}.head-sub{color:#bfc7cf;font-size:12px;flex:1}.ghost{color:var(--cream);border:1px solid #ffffff55;background:transparent;border-radius:8px;padding:7px 12px}
    .shell{max-width:1440px;margin:auto;padding:15px}.notice{background:#fff5d6;border:1px solid #ecd48a;color:#715708;border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:12px}
    .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.tabs{display:flex;gap:6px;flex:1;overflow:auto}.tab{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:999px;padding:7px 12px;font-size:12px}.tab.active{background:var(--navy);border-color:var(--navy);color:#fff}.badge{background:var(--red);color:#fff;border-radius:999px;padding:0 6px;font-size:10px;margin-right:4px}.refresh{background:#fff;color:var(--navy);border:1px solid var(--line);border-radius:9px;padding:8px 13px}
    .workspace{height:calc(100vh - 158px);min-height:520px;display:grid;grid-template-columns:350px minmax(0,1fr) 250px;background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 2px 10px #0d1b2a16}.list{border-left:1px solid var(--line);overflow:auto}.empty{padding:35px 18px;text-align:center;color:var(--muted);font-size:13px}.thread{padding:14px 15px;border-bottom:1px solid var(--line);cursor:pointer}.thread:hover,.thread.selected{background:#f5faf7}.thread.overdue{border-right:4px solid var(--red)}.row{display:flex;justify-content:space-between;gap:8px;align-items:center}.name{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.preview{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:3px}.time{font-size:11px;color:var(--muted);white-space:nowrap}.state{font-size:10px;border-radius:999px;padding:2px 7px;background:#edf6f0;color:#167143}.state.overdue{background:#fce7e5;color:#af2929}.state.none{background:#eee;color:#666}
    .chat{display:flex;flex-direction:column;min-width:0}.chat-top{padding:13px 17px;border-bottom:1px solid var(--line);min-height:67px}.chat-name{font-weight:700}.chat-phone{font-size:11px;color:var(--muted);direction:ltr;text-align:right}.messages{flex:1;overflow:auto;padding:20px;background:#f8f8f5;display:flex;flex-direction:column;gap:10px}.bubble{width:fit-content;max-width:78%;padding:9px 12px;border-radius:12px;font-size:13px;white-space:pre-wrap;word-break:break-word;background:#fff;border:1px solid #eee}.bubble.out{align-self:flex-start;background:#dff3e7;border-color:#c8e9d4}.meta{display:block;font-size:10px;color:var(--muted);margin-top:4px}.composer{padding:12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:end}.composer textarea{min-height:46px;max-height:130px;resize:vertical}.composer .primary{min-width:75px}
    .details{border-right:1px solid var(--line);padding:16px;overflow:auto}.details h3{margin:0 0 14px;font-size:15px}.field{font-size:11px;color:var(--muted);margin-top:14px}.value{font-size:13px;margin-top:3px;word-break:break-word}.details select{font-size:12px;padding:8px}.close{margin-top:15px;width:100%;background:#fff;color:var(--red);border:1px solid #e9b2ae;border-radius:9px;padding:9px;font-weight:700}.loading{padding:28px;text-align:center;color:var(--muted)}
    @media(max-width:850px){.workspace{grid-template-columns:310px minmax(0,1fr)}.details{display:none}}@media(max-width:620px){header{padding:0 12px}.head-sub{display:none}.shell{padding:8px}.workspace{height:calc(100vh - 140px);display:block;position:relative}.list,.chat{height:100%}.chat{position:absolute;inset:0;background:#fff;z-index:2}.chat.no-selection{display:none}.back{display:inline-block}.details{display:none}.bubble{max-width:88%}.toolbar select{width:100%}}@media(min-width:621px){.back{display:none}}
  </style>
</head>
<body>
<main id="app"></main>
<script>
const SB="https://pxeiozmsfvmypcsqbcqv.supabase.co";
const API=SB+"/functions/v1/whatsapp-inbox";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4ZWlvem1zZnZteXBjc3FiY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDI1MTcsImV4cCI6MjA5NzYxODUxN30.s23PCgc_HuGRUSdN3hMNXBsdsavofLBIZj3Ppq5lP94";
let session=null, profile=null, team=[], conversations=[], selected=null, messages=[], filter="unassigned", loading=false;
// The dashboard is the only sign-in point. It sends its current session in the
// fragment when opening this standalone module; remove that fragment immediately.
try{const handoff=new URLSearchParams(location.hash.slice(1)).get("shareek_session");if(handoff){session=JSON.parse(decodeURIComponent(handoff));history.replaceState(null,"",location.pathname+location.search)}}catch{}
const app=document.getElementById("app");
const esc=s=>String(s??"").replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const time=v=>v?new Intl.DateTimeFormat("ar-IQ",{hour:"numeric",minute:"2-digit"}).format(new Date(v)):"";
const ago=v=>{const m=Math.max(0,Math.round((Date.now()-new Date(v).getTime())/60000));return m<1?"الآن":m<60?`منذ ${m} د`:`منذ ${Math.round(m/60)} س`};
async function api(body){const r=await fetch(API,{method:"POST",headers:{apikey:ANON,Authorization:"Bearer "+session.access_token,"content-type":"application/json"},body:JSON.stringify(body)});if(r.status===401)throw new Error("انتهت الجلسة، سجّل الدخول مجدداً.");const data=await r.json();if(!r.ok)throw new Error(data.error||"حدث خطأ في الخادم");return data}
function login(error=""){app.innerHTML=`<section class="login"><div class="logo">Shareek <i>Inbox</i></div><p>افتح صندوق واتساب من لوحة Shareek الرئيسية.</p><div class="error">${esc(error)}</div></section>`}
async function start(){try{profile=await api({action:"profile"});if(!profile.clients.length)return render("لا يوجد عميل مفعّل لهذا الحساب.");if(!profile.call_center_code)profile.call_center_code=profile.clients[0].call_center_code;await loadAll();render()}catch(e){session=null;login(e.message)}}
async function loadAll(){loading=true;render();const code=profile.call_center_code;try{const [inbox,people]=await Promise.all([api({action:"inbox",call_center_code:code,assignee:filter==="mine"?"me":filter==="unassigned"?"unassigned":undefined,overdue:filter==="overdue"}),api({action:"team",call_center_code:code})]);conversations=inbox.conversations;team=people.users;if(selected&&!conversations.some(c=>c.id===selected.id)){selected=null;messages=[]}if(selected)await loadMessages(selected.id)}catch(e){alert(e.message)}finally{loading=false}}
async function loadMessages(id){const r=await api({action:"conversation",conversation_id:id});messages=r.messages}
function selectConversation(id){selected=conversations.find(c=>c.id===id);messages=[];render();loadMessages(id).then(render).catch(e=>alert(e.message))}
function status(c){if(!c.first_response_at&&new Date(c.response_due_at)<new Date())return ["متأخرة","overdue"];if(!c.assignee_user_id)return ["غير معيّنة","none"];return ["قيد المتابعة",""]}
function render(note=""){if(!session)return login();const active=conversations.filter(c=>!c.first_response_at&&new Date(c.response_due_at)<new Date()).length;const current=selected?conversations.find(c=>c.id===selected.id)||selected:null;const clientOptions=(profile.clients||[]).map(c=>`<option value="${esc(c.call_center_code)}" ${c.call_center_code===profile.call_center_code?"selected":""}>${esc(c.display_name||c.call_center_code)}</option>`).join("");const tabs=[["unassigned","غير معيّنة"],["mine","محادثاتي"],["overdue",`متأخرة <span class="badge">${active}</span>`],["all","الكل"]];app.innerHTML=`<header><div class="logo">Shareek <i>Inbox</i></div><span class="head-sub">صندوق واتساب المشترك</span>${profile.clients.length>1?`<select onchange="changeClient(this.value)" style="width:auto;padding:6px">${clientOptions}</select>`:""}<button class="ghost" onclick="logout()">خروج</button></header><div class="shell">${note?`<div class="notice">${esc(note)}</div>`:""}<div class="toolbar"><div class="tabs">${tabs.map(([id,label])=>`<button class="tab ${filter===id?"active":""}" onclick="setFilter('${id}')">${label}</button>`).join("")}</div><button class="refresh" onclick="refresh()">تحديث</button></div><section class="workspace"><aside class="list">${loading?`<div class="loading">جارٍ التحميل…</div>`:conversations.length?conversations.map(threadHtml).join(""):`<div class="empty">لا توجد محادثات في هذه القائمة.</div>`}</aside><section class="chat ${current?"":"no-selection"}">${current?chatHtml(current):`<div class="empty" style="margin:auto">اختر محادثة من القائمة لعرضها والرد عليها.</div>`}</section><aside class="details">${current?detailsHtml(current):`<div class="empty">اختر محادثة</div>`}</aside></section></div>`}
function threadHtml(c){const contact=Array.isArray(c.whatsapp_contacts)?c.whatsapp_contacts[0]:c.whatsapp_contacts||{};const [label,cls]=status(c);return `<article class="thread ${selected?.id===c.id?"selected":""} ${cls}" onclick="selectConversation('${c.id}')"><div class="row"><span class="name">${esc(contact.display_name||contact.phone_number||"عميل")}</span><span class="time">${ago(c.last_message_at)}</span></div><div class="preview">${c.assignee_user_id?"تم التعيين":"يحتاج إلى مسؤول"}</div><div class="row" style="margin-top:6px"><span class="state ${cls}">${label}</span><span class="time">${!c.first_response_at?`الرد قبل ${time(c.response_due_at)}`:"تم الرد"}</span></div></article>`}
function chatHtml(c){const contact=Array.isArray(c.whatsapp_contacts)?c.whatsapp_contacts[0]:c.whatsapp_contacts||{};const visible=messages.filter(m=>m.delivery_status!=="failed");return `<div class="chat-top"><button class="back refresh" onclick="selected=null;messages=[];render()">رجوع</button><div class="chat-name">${esc(contact.display_name||"عميل")}</div><div class="chat-phone">${esc(contact.phone_number||"")}</div></div><div class="messages">${visible.length?visible.map(m=>`<div class="bubble ${m.direction==='outbound'?"out":""}">${esc(m.body||`[${m.message_type}]`)}<span class="meta">${m.direction==='outbound'?"أنت · ":"العميل · "}${time(m.customer_sent_at||m.created_at)}</span></div>`).join(""):`<div class="empty">جارٍ تحميل الرسائل…</div>`}</div><div class="composer"><textarea id="reply" placeholder="اكتب ردك هنا…" onkeydown="if(event.ctrlKey&&event.key==='Enter')sendReply()"></textarea><button class="primary" onclick="sendReply()">إرسال</button></div>`}
function detailsHtml(c){const contact=Array.isArray(c.whatsapp_contacts)?c.whatsapp_contacts[0]:c.whatsapp_contacts||{};const [label,cls]=status(c);const people=team.map(u=>`<option value="${u.user_id}" ${u.user_id===c.assignee_user_id?"selected":""}>${esc(u.email||u.role)}</option>`).join("");return `<h3>تفاصيل المحادثة</h3><div class="field">الحالة</div><div class="value"><span class="state ${cls}">${label}</span></div><div class="field">المسؤول</div><select id="assignee" onchange="assign('${c.id}',this.value)"><option value="">اختر موظفاً…</option>${people}</select><div class="field">وقت أول رسالة</div><div class="value">${time(c.first_customer_message_at)}</div><div class="field">مهلة الرد</div><div class="value" style="color:${cls==='overdue'?'var(--red)':'inherit'}">${c.first_response_at?"تم الرد":time(c.response_due_at)}</div><div class="field">رقم العميل</div><div class="value" dir="ltr">${esc(contact.phone_number||"")}</div><button class="close" onclick="closeConversation('${c.id}')">إغلاق المحادثة</button>`}
async function setFilter(v){filter=v;selected=null;messages=[];await loadAll();render()}async function refresh(){await loadAll();render()}async function changeClient(v){profile.call_center_code=v;selected=null;messages=[];await loadAll();render()}async function assign(id,userId){if(!userId)return;try{await api({action:"assign",conversation_id:id,assignee_user_id:userId});await refresh()}catch(e){alert(e.message)}}async function closeConversation(id){if(!confirm("هل تريد إغلاق هذه المحادثة؟"))return;try{await api({action:"close",conversation_id:id});selected=null;messages=[];await refresh()}catch(e){alert(e.message)}}async function sendReply(){const box=document.getElementById("reply"),body=box?.value.trim();if(!body||!selected)return;box.disabled=true;try{await api({action:"reply",conversation_id:selected.id,body});box.value="";await refresh();await loadMessages(selected.id);render()}catch(e){alert(e.message);box.disabled=false}}function logout(){window.close()}if(session)start();else login();setInterval(()=>{if(session)refresh()},30000);
</script>
</body>
</html>
