<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shareek — WhatsApp Setup</title>
<style>body{margin:0;background:#e8e6dd;color:#0d1b2a;font:15px system-ui,sans-serif}.wrap{max-width:1040px;margin:32px auto;padding:0 16px}.card{background:#fff;border-radius:14px;padding:20px;margin:16px 0;box-shadow:0 2px 10px #0001}h1,h2{margin-top:0}input,select{box-sizing:border-box;padding:10px;border:1px solid #ccd;border-radius:8px;width:100%}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.grid.wide{grid-template-columns:repeat(2,1fr)}button{padding:10px 14px;border:0;border-radius:8px;background:#2fa36b;color:white;font-weight:700;cursor:pointer}.secondary{background:#0d1b2a}.muted{color:#68717b;font-size:13px}.error{color:#b52f2f;margin-top:10px}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{text-align:left;border-bottom:1px solid #eee;padding:9px;font-size:13px}@media(max-width:700px){.grid,.grid.wide{grid-template-columns:1fr}}</style>
<main class="wrap" id="app"></main><script>
const SB="https://pxeiozmsfvmypcsqbcqv.supabase.co",ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4ZWlvemZ2bXlwY3NxYmNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDI1MTcsImV4cCI6MjA5NzYxODUxN30.s23PCgc_HuGRUSdN3hMNXBsdsavofLBIZj3Ppq5lP94",API=SB+"/functions/v1/admin";let session,data;
const esc=s=>String(s??"").replace(/[&<>\"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
async function call(body){const r=await fetch(API,{method:"POST",headers:{apikey:ANON,Authorization:"Bearer "+session.access_token,"content-type":"application/json"},body:JSON.stringify(body)}),j=await r.json().catch(()=>({}));if(!r.ok)throw Error(j.error||"Request failed");return j}
function login(err=""){app.innerHTML=`<section class="card" style="max-width:420px;margin:12vh auto"><h1>Shareek WhatsApp Setup</h1><p class="muted">Create Inbox-only clients and connect their WhatsApp numbers. This does not create a recording dashboard or add a phone recorder.</p><div class="grid"><input id="email" type="email" placeholder="Admin email"><input id="password" type="password" placeholder="Password"></div><p><button onclick="signIn()">Sign in</button></p><div class="error">${esc(err)}</div></section>`}
async function signIn(){try{const r=await fetch(SB+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:ANON,"content-type":"application/json"},body:JSON.stringify({email:email.value.trim(),password:password.value})});if(!r.ok)throw Error("Incorrect email or password");session=await r.json();await load()}catch(e){login(e.message)}}
async function load(note=""){try{data=await call({action:"list_whatsapp"});render(note)}catch(e){login(e.message)}}
function options(){return (data.clients||[]).filter(c=>c.active).map(c=>`<option value="${esc(c.call_center_code)}">${esc(c.display_name||c.call_center_code)} (${esc(c.call_center_code)})</option>`).join("")}
function render(note=""){const clients=data.clients||[],channels=data.channels||[],users=data.users||[];app.innerHTML=`<h1>Shareek WhatsApp Setup</h1><p class="muted">This area is independent from the main dashboard and call-recording system.</p>${note?`<p style="color:#167143">${esc(note)}</p>`:""}<section class="card"><h2>1. Add WhatsApp-only client</h2><div class="grid wide"><input id="client_code" placeholder="Client code, e.g. BAGHDAD_SHOP"><input id="client_name" placeholder="Client business name"></div><p><button onclick="addClient()">Add Inbox client</button></p><table><tr><th>Client</th><th>Code</th><th>Status</th></tr>${clients.map(c=>`<tr><td>${esc(c.display_name||"—")}</td><td>${esc(c.call_center_code)}</td><td>${c.active?"Active":"Inactive"}</td></tr>`).join("")||"<tr><td colspan=3>No Inbox clients yet.</td></tr>"}</table></section><section class="card"><h2>2. Connect WhatsApp number</h2><p class="muted">Use the Meta Phone Number ID and WhatsApp Business Account ID—not an access token.</p><div class="grid"><select id="channel_client"><option value="">Choose Inbox client</option>${options()}</select><input id="phone_id" placeholder="Meta Phone Number ID"><input id="waba_id" placeholder="Meta WABA ID"><input id="display_number" placeholder="Public WhatsApp number, e.g. +964…"><input id="display_name" placeholder="WhatsApp display name"><input id="sla" type="number" value="10" min="1" max="1440" placeholder="First response minutes"></div><p><button onclick="addChannel()">Connect number</button></p><table><tr><th>Client</th><th>Number</th><th>Name</th><th>SLA</th></tr>${channels.map(c=>`<tr><td>${esc(c.call_center_code)}</td><td>${esc(c.display_phone_number||c.phone_number_id)}</td><td>${esc(c.display_name||"—")}</td><td>${esc(c.first_response_sla_minutes)} min</td></tr>`).join("")||"<tr><td colspan=4>No numbers connected yet.</td></tr>"}</table></section><section class="card"><h2>3. Add Inbox user</h2><div class="grid"><select id="user_client"><option value="">Choose Inbox client</option>${options()}</select><input id="user_email" type="email" placeholder="User email"><input id="user_password" type="password" placeholder="Temporary password (6+ chars)"><select id="user_role"><option value="agent">Agent</option><option value="manager">Manager</option></select></div><p><button onclick="addUser()">Add Inbox user</button> <button class="secondary" onclick="logout()">Sign out</button></p><table><tr><th>Email</th><th>Client</th><th>Role</th><th>Status</th></tr>${users.map(u=>`<tr><td>${esc(u.email)}</td><td>${esc(u.call_center_code)}</td><td>${esc(u.role)}</td><td>${u.active?"Active":"Inactive"}</td></tr>`).join("")||"<tr><td colspan=4>No Inbox users yet.</td></tr>"}</table></section>`}
async function addClient(){try{await call({action:"add_whatsapp_client",call_center_code:client_code.value.trim(),display_name:client_name.value.trim()});await load("Inbox client added.")}catch(e){alert(e.message)}}
async function addChannel(){try{await call({action:"add_whatsapp_channel",call_center_code:channel_client.value,phone_number_id:phone_id.value.trim(),waba_id:waba_id.value.trim(),display_phone_number:display_number.value.trim(),display_name:display_name.value.trim(),first_response_sla_minutes:Number(sla.value)});await load("WhatsApp number connected.")}catch(e){alert(e.message)}}
async function addUser(){try{await call({action:"add_whatsapp_user",call_center_code:user_client.value,email:user_email.value.trim(),password:user_password.value,role:user_role.value});await load("Inbox user added.")}catch(e){alert(e.message)}}function logout(){session=null;login()}login();
</script></html>
